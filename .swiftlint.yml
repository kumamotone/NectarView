disabled_rules:
  - multiple_closures_with_trailing_closure
  - large_tuple

line_length:
  warning: 200
  error: 300

file_length:
  warning: 500
  error: 1000

type_body_length:
  warning: 400
  error: 600

function_body_length:
  warning: 80
  error: 150

cyclomatic_complexity:
  warning: 15
  error: 25

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - x
    - y
    - i

excluded:
  - NectarViewTests
  - NectarViewUITests
